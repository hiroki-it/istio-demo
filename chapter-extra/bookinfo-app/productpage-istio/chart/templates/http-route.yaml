apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.service.name }}
spec:
  parentRefs:
    - name: istio-ingress
      namespace: istio-ingress
  rules:
    - backendRefs:
        - kind: Service
          name: {{ .Values.service.name }}
          port: {{ .Values.service.port }}
