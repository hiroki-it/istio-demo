nginxGateway:
  gatewayClassName: nginx

gateways:
  - name: nginx-gateway
    spec:
      gatewayClassName: nginx
      listeners:
        - name: http-productpage
          protocol: HTTP
          port: 9080
          allowedRoutes:
            namespaces:
              from: All

nginx:
  service:
    type: NodePort
    nodePorts:
      - port: 30000
        listenerPort: 9080
  pod:
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: node.kubernetes.io/nodegroup
                  operator: In
                  values:
                    - ingress
  container:
    resources:
      requests:
        cpu: 50m
        memory: 51Mi
      limits:
        cpu: 500m
        memory: 512Mi
